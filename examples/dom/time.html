<meta charset="UTF-8">
<h1>XTime Example</h1>
<script type="module" src="../../components/time.js"></script>

<h2>格式化显示</h2>
<div><time is="x-time"></time></div>
<div><time is="x-time" format="{HH}:{mm}:{ss}"></time></div>
<div><time is="x-time" format="{yyyy}/{MM}/{dd}" datetime="2023-08-15T12:00:00Z"></time></div>
<div><time is="x-time" >2026-04-22 04:34:44 +0000 UTC</time></div>

<h2>时区控制</h2>
<div><time is="x-time" timezone="America/New_York"></time></div>
<div><time is="x-time" timezone="Asia/Tokyo" format="{HH}:{mm}"></time></div>

<h2>倒计时/正计时 (diff 属性)</h2>
<div><time is="x-time" diff datetime="2038-01-19T03:14:07Z" update-interval="1000"></time></div>
<div><time is="x-time" diff datetime="2024-01-01T00:00:00Z" update-interval="1000"></time></div>
<div><time is="x-time" diff timezone="Asia/Shanghai" update-interval="1000">2026-04-22 13:21:23</time></div>

<h2>多语言支持</h2>
<div><time is="x-time" diff update-interval="1000">2026-04-22 13:21:23</time></div>
<div><time is="x-time" diff update-interval="1000">2038-01-19T03:14:07Z</time></div>
